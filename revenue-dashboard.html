<!DOCTYPE html>
<html>
<head>
    <title>Revenue Dashboard</title>
    <style>
        body { background: #0f0c29; color: #fff; font-family: Arial; padding: 40px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin: 10px 0; }
        .number { font-size: 36px; font-weight: 700; color: #10b981; }
        .label { color: #888; }
        button { background: #667eea; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>💰 Revenue Dashboard</h1>
    <button onclick="refreshData()">🔄 Refresh</button>
    <div id="data">
        <div class="card"><div class="number" id="leads">0</div><div class="label">Total Leads</div></div>
        <div class="card"><div class="number" id="interested">0</div><div class="label">Interested</div></div>
        <div class="card"><div class="number" id="revenue">$0</div><div class="label">Revenue</div></div>
        <div id="leadsList"></div>
    </div>

    <script>
        async function refreshData() {
            console.log('🔄 Refreshing...');
            try {
                // Try High-Velocity
                const hv = await fetch('/api/sales/high-velocity');
                if (hv.ok) {
                    const data = await hv.json();
                    if (data.deals && data.deals.length > 0) {
                        document.getElementById('leads').textContent = data.deals.length;
                        document.getElementById('interested').textContent = data.deals.filter(d => d.stage === 'proposal_sent' || d.stage === 'negotiation').length;
                        document.getElementById('revenue').textContent = '$' + (data.revenue || 0);
                        
                        let html = '<h3>Leads:</h3>';
                        data.deals.slice(0, 5).forEach(d => {
                            html += '<div class="card">' + (d.lead ? d.lead.name : 'Unknown') + ' - ' + (d.lead ? d.lead.company : '') + ' - ' + (d.stage || 'new') + '</div>';
                        });
                        document.getElementById('leadsList').innerHTML = html;
                        return;
                    }
                }
                
                // Try Apify
                const apify = await fetch('/api/apify/leads');
                if (apify.ok) {
                    const data = await apify.json();
                    if (data.leads && data.leads.length > 0) {
                        document.getElementById('leads').textContent = data.leads.length;
                        document.getElementById('interested').textContent = data.leads.filter(l => l.score >= 50).length;
                        document.getElementById('revenue').textContent = '$0';
                        
                        let html = '<h3>Leads:</h3>';
                        data.leads.slice(0, 5).forEach(l => {
                            html += '<div class="card">' + (l.name || 'Unknown') + ' - ' + (l.company || '') + ' - Score: ' + (l.score || 0) + '</div>';
                        });
                        document.getElementById('leadsList').innerHTML = html;
                        return;
                    }
                }
                
                document.getElementById('leadsList').innerHTML = '<div class="card">No data found. Check API.</div>';
            } catch(e) {
                document.getElementById('leadsList').innerHTML = '<div class="card">Error: ' + e.message + '</div>';
            }
        }
        refreshData();
    </script>
</body>
</html>
